# =============================================================================
# POS profili — yerel veya sunucu PostgreSQL
# Çalıştırma: java -jar ... --spring.profiles.active=pos
# veya: SPRING_PROFILES_ACTIVE=pos ./mvnw spring-boot:run
# =============================================================================
#
# Önkoşul: Veritabanı oluşturulmuş olmalı:
#   createdb bodrum_aqua_park
#   veya: psql -d postgres -c "CREATE DATABASE bodrum_aqua_park;"
#
# Kimlik bilgisi (şifreyi repoya yazmayın):
#   export SPRING_DATASOURCE_USERNAME=postgres
#   export SPRING_DATASOURCE_PASSWORD=gizli
#   export SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5432/bodrum_aqua_park
#
# Varsayılan kullanıcı: postgres (kurulumda oluşturduğunuz süper kullanıcı).
# macOS Homebrew’de sadece OS kullanıcınız varsa: export SPRING_DATASOURCE_USERNAME=$(whoami)
# =============================================================================

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bodrum_aqua_park}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Güncelleme çoğu sütunu ekler; "admin_panel_access does not exist" hatasında:
#   psql ... -f scripts/postgresql-staff-users-admin-panel.sql
# TICKET (bilet satış) rolü eklerken "staff_users_role_check" hatasında:
#   psql ... -f scripts/postgresql-staff-users-role-ticket.sql
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.h2.console.enabled=false

# Türkiye saati (log / Instant / JSON tarihleri için tutarlılık)
spring.jackson.time-zone=Europe/Istanbul
spring.jpa.properties.hibernate.jdbc.time_zone=Europe/Istanbul

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000

# Turnike: karttan düşülen giriş ücreti (TL)
app.entry.fee=50.00

# JWT, server.port, fiş yazıcı, app.card.* → application.properties (burada tekrarlamaya gerek yok)
# Üretim: APP_JWT_SECRET ortam değişkeni zorunlu; ana dosyadaki varsayılan secret kullanılmamalı
