# Yerel geliştirmede 0000 şifresi bozulduysa otomatik onar (prod’da kullanmayın)
app.bootstrap.repair-admin0000=true

# NOT: h2:mem — uygulama kapanınca tüm veri silinir. Yerel geliştirmede kalıcılık için dosya tabanlı H2.
# Kalıcı veri için PostgreSQL: --spring.profiles.active=pos (application-pos.properties)
spring.datasource.url=jdbc:h2:file:./data/bodrum-dev;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.h2.console.enabled=true

# Turnike: karttan düşülen giriş ücreti (TL)
app.entry.fee=50.00
