spring.application.name=bodrum-aqua-park-api
app.version=1.2.0.0
# Günlük: göreli yol (IDE / doğru cwd). Windows USB: BodrumAquaPark.bat LOG_FILE=mutlak yol atar (start ile cwd sorunu).
logging.file.name=bodrum-sunucu.log
# Varsayılan: pos (PostgreSQL). H2 dosya için: SPRING_PROFILES_ACTIVE=dev veya IDE'de "dev — H2" launch.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:pos}

server.port=8081

# JWT (üretimde APP_JWT_SECRET ortam değişkeni ile güçlü ve en az 32 karakter)
app.jwt.secret=${APP_JWT_SECRET:bodrum-aqua-park-dev-secret-change-in-prod-32b-min}
app.jwt.expiration-hours=12

# Fiş yazıcı (Sewoo vb. ESC/POS, USB → sanal COM). Windows: Aygıt Yöneticisi → COM numarası.
# Varsayılan boş: bir kez yönetim → Fiş yazıcıda test + kayıt (veritabanı), veya APP_PRINTER_PORT=COM3.
app.printer.port=${APP_PRINTER_PORT:}
app.printer.baud-rate=${APP_PRINTER_BAUD:9600}
# Windows: Yazıcı kuyruk adı (Aygıtlar ve Yazıcılar'daki ad) — doluysa COM yerine javax.print ile ham gönderim.
# Örn: APP_PRINTER_WINDOWS_QUEUE=SEWOO SLK-TS400  (her kasa PC'de ayrı ortam değişkeni önerilir.)
app.printer.windows-queue-name=${APP_PRINTER_WINDOWS_QUEUE:}

# Kart tanımlamada initialBalance 0 ise bu tutar kullanılır (demo / geçici varsayılan)
app.card.default-initial-balance=5000

# Demo POS: bu UID başlangıçta yoksa oluşturulur, varsa bakiye aşağıdaki tutara çekilir. Boş = kapalı.
app.card.demo-uid=123
app.card.demo-balance=5000

# true: her açılışta sicil 0000 parolasını "0000" yapar ve hesabı aktif eder (unutulan şifre / bozuk hash kurtarma)
app.bootstrap.repair-admin0000=${APP_REPAIR_ADMIN0000:false}

# PostgreSQL (sunucu / prod): --spring.profiles.active=prod + ortam değişkenleri
# POS bank + yerel PostgreSQL: --spring.profiles.active=pos (ayrıntı: application-pos.properties)
