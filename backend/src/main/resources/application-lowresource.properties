# Düşük RAM / yavaş CPU (ör. eski POS, 2 GB): Spring Boot + Tomcat yükünü azaltır.
# Kullanım: --spring.profiles.active=lowresource veya ortam: SPRING_PROFILES_ACTIVE=lowresource

spring.main.banner-mode=off
# Windows POS: javax.print ile Sewoo vb. kuyruğa iş düşmesi için (varsayılan headless=true çoğu kurulumda kuyruk boş kalır)
spring.main.headless=false
spring.jmx.enabled=false
spring.output.ansi.enabled=never

# Konsol logu CPU/disk yükünü azaltır (INFO her istekte maliyetli)
logging.level.root=WARN
logging.level.org.springframework=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.level.org.apache.catalina=WARN
logging.level.org.apache.tomcat=WARN
logging.level.com.bodrumaquapark.service.PrinterService=INFO

server.tomcat.threads.max=24
server.tomcat.min-spare-threads=1
server.tomcat.accept-count=50
